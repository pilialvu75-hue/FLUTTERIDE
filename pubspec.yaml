name: mobile_ide
description: Offline-first multiplatform mobile IDE – no internet required.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database – offline-first
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File-system paths (for Hive box storage)
  path_provider: ^2.1.4

  # UUID generation for project IDs (pure Dart, no network)
  uuid: ^4.5.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code-generation for Hive adapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

  # Hive in-memory testing utilities
  hive_test: ^1.0.1

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
